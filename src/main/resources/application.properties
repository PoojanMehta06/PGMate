# PostgreSQL Database Connection Settings (Vercel Postgres / local)
# Vercel sets POSTGRES_URL env var; fallback to local for development
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/pgmate}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Auto-run seed data after Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Use Railway-assigned port ($PORT) or fallback to 8081 for local development
server.port=${PORT:8081}