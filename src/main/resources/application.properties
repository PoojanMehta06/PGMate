# MySQL Database JDBC Connection Settings
# Railway MySQL provides MYSQL_URL env var; fallback to local for development
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/sy_project_pgmate}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Auto-run seed data after Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Use Railway-assigned port ($PORT) or fallback to 8081 for local development
server.port=${PORT:8081}