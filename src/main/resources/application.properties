# MySQL Database JDBC Connection Settings (UPDATED)
spring.datasource.url=jdbc:mysql://localhost:3306/sy_project_pgmate
spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Auto-run seed data after Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# FIX: Change the server port to 8081 to avoid conflicts
server.port=8081